    <meta http-equiv="Pragma" content="no-cache" />

    <title>MOOVIED</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preconnect" href="https://script.google.com">

    <link rel="preconnect" href="https://script.googleusercontent.com">

    <script>
    (function () {
      var GAS  = 'https://script.google.com/macros/s/AKfycbw5QsOM-yMbD-3p9Eci_9j3sSnFIvw6TeCXsdapWvFntFzcaVJ3BpQmnoAMc0uAmL0i/exec';
      var API  = window.location.origin + '/api';
      var DEAD = 'https://a16cbf22-021e-4fbd-a6d1-5c8d3c7e4244-00-923mtzjoxrcz.worf.replit.dev/api';

      /* 1. Set localStorage so ts() reads our server URL */
      try {
        localStorage.setItem('moovied_comments_api_url', API);
        localStorage.setItem('moovied_api_server_url',   API);
        localStorage.setItem('moovied_gas_url',           GAS);
      } catch(e) {}

      /* 2. Override Storage.prototype.getItem as extra safety */
      try {
        var _g = Storage.prototype.getItem;
        Storage.prototype.getItem = function (k) {
          if (k === 'moovied_comments_api_url') return API;
          if (k === 'moovied_api_server_url')   return API;
          if (k === 'moovied_gas_url')           return GAS;
          return _g.call(this, k);
        };
      } catch(e) {}

      /* 3. Nuclear fix: intercept window.fetch to rewrite the dead URL.
            Even if ts() returns the old dead URL, this catch-all rewrites it.
            The "GAS not connected" banner CANNOT appear. */
      try {
        var _f = window.fetch.bind(window);
        window.fetch = function (u, o) {
          if (typeof u === 'string' && u.startsWith(DEAD)) {
            u = API + u.slice(DEAD.length);
          }
          return _f(u, o);
        };
      } catch(e) {}

      /* 4. Cross-device user data sync.
            On login: pull profile + bookmarks + watch history + likes from GAS,
                      write them into localStorage so the app shows them on this device.
            On change: push localStorage edits back to GAS (debounced).
            Storage keys used by the app:
              moovied_session         — current user
              moovied_bookmarks       — array of movie ids
              moovied_watch_history   — array of {movie_id, watched_at, progress}
              moovied_movie_likes     — array of liked movie ids
      */
      try {
        var SESSION_KEY = 'moovied_session';
        var BOOKMARKS_KEY = 'moovied_bookmarks';
        var HISTORY_KEY = 'moovied_watch_history';
        var LIKES_KEY = 'moovied_movie_likes';
        var SYNCED_FLAG = 'moovied_synced_for_user';
        var REMOTE_WRITE_FLAG = '__moovied_remote_write__';

        function gasPost(payload) {
          return _f(GAS, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          }).then(function(r){ return r.json(); }).catch(function(){ return null; });
        }

        function gasGet(action, params) {
          var q = 'action=' + encodeURIComponent(action);
          if (params) Object.keys(params).forEach(function(k){
            q += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
          });
          return _f(GAS + '?' + q).then(function(r){ return r.json(); }).catch(function(){ return null; });
        }

        function getCurrentUser() {
          try {
            var raw = localStorage.getItem(SESSION_KEY);
            if (!raw) return null;
            return JSON.parse(raw);
          } catch(e) { return null; }
        }

        function readJson(key) {
          try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){ return []; }
        }

        function mergeIdLists(local, remote) {
          var seen = {}, out = [];
          (remote || []).concat(local || []).forEach(function(id){
            var k = String(id);
            if (!seen[k]) { seen[k] = 1; out.push(k); }
          });
          return out;
        }

        function mergeHistory(local, remote) {
          var byId = {};
          (remote || []).forEach(function(it){
            if (!it) return;
            var mid = it.movie_id || it.movieId || it.id;
            if (!mid) return;
            byId[mid] = { movie_id: String(mid), watched_at: it.watched_at || '', progress: Number(it.progress)||0 };
          });
          (local || []).forEach(function(it){
            if (!it) return;
            var mid = (typeof it === 'string') ? it : (it.movie_id || it.movieId || it.id);
            if (!mid) return;
            var when = (typeof it === 'string') ? new Date().toISOString() : (it.watched_at || it.watchedAt || '');
            var prog = (typeof it === 'string') ? 0 : (Number(it.progress)||0);
            var existing = byId[mid];
            if (!existing || (when && when > (existing.watched_at || ''))) {
              byId[mid] = { movie_id: String(mid), watched_at: when || new Date().toISOString(), progress: prog };
            }
          });
          var arr = Object.keys(byId).map(function(k){ return byId[k]; });
          arr.sort(function(a,b){ return new Date(b.watched_at) - new Date(a.watched_at); });
          return arr;
        }

        function pullUserData(userId) {
          if (!userId) return;
          gasGet('getUserData', { userId: userId }).then(function(res){
            if (!res || !res.success) return;
            var localBm = readJson(BOOKMARKS_KEY);
            var localHi = readJson(HISTORY_KEY);
            var localLk = readJson(LIKES_KEY);
            var mergedBm = mergeIdLists(localBm, res.bookmarks);
            var mergedHi = mergeHistory(localHi, res.watchHistory);
            var mergedLk = mergeIdLists(localLk, res.likes);
            var bmChanged = mergedBm.length !== (res.bookmarks || []).length;
            var hiChanged = mergedHi.length !== (res.watchHistory || []).length;
            window[REMOTE_WRITE_FLAG] = true;
            try {
              localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(mergedBm));
              localStorage.setItem(HISTORY_KEY,   JSON.stringify(mergedHi));
              localStorage.setItem(LIKES_KEY,     JSON.stringify(mergedLk));
              // Merge any extra profile fields into stored session (without overwriting isAdmin)
              var u = getCurrentUser();
              if (u && res.profile) {
                ['name','country','avatar_url','bio','phone','birthday','gender'].forEach(function(f){
                  if (res.profile[f] !== undefined && res.profile[f] !== '') u[f] = res.profile[f];
                });
                var was = window[REMOTE_WRITE_FLAG];
                window[REMOTE_WRITE_FLAG] = true;
                localStorage.setItem(SESSION_KEY, JSON.stringify(u));
                window[REMOTE_WRITE_FLAG] = was;
              }
              localStorage.setItem(SYNCED_FLAG, userId);
            } finally {
              window[REMOTE_WRITE_FLAG] = false;
            }
            // If local had items the cloud didn't, push the merged set back so
            // the cloud (and other devices) catches up.
            if (localBm.length > 0 && bmChanged) {
              gasPost({ action: 'setBookmarks', userId: userId, bookmarks: mergedBm });
            }
            if (localHi.length > 0 && hiChanged) {
              gasPost({ action: 'setWatchHistory', userId: userId, watchHistory: mergedHi });
            }
            // Notify the React app to re-read storage
            try { window.dispatchEvent(new Event('moovied-data-synced')); } catch(e){}
          });
        }

        var pushTimers = {};
        function debouncedPush(key, fn) {
          if (pushTimers[key]) clearTimeout(pushTimers[key]);
          pushTimers[key] = setTimeout(fn, 600);
        }

        function pushBookmarks() {
          var u = getCurrentUser(); if (!u || !u.id) return;
          var ids;
          try { ids = JSON.parse(localStorage.getItem(BOOKMARKS_KEY) || '[]'); } catch(e){ ids = []; }
          gasPost({ action: 'setBookmarks', userId: u.id, bookmarks: ids });
        }

        function pushHistory() {
          var u = getCurrentUser(); if (!u || !u.id) return;
          var items;
          try { items = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e){ items = []; }
          // Normalise — the app may store either raw movie ids (strings) or objects
          var norm = items.map(function(it){
            if (typeof it === 'string') return { movie_id: it, watched_at: new Date().toISOString(), progress: 0 };
            return {
              movie_id: it.movie_id || it.movieId || it.id,
              watched_at: it.watched_at || it.watchedAt || new Date().toISOString(),
              progress: Number(it.progress) || 0
            };
          }).filter(function(it){ return it.movie_id; });
          gasPost({ action: 'setWatchHistory', userId: u.id, watchHistory: norm });
        }

        function pushProfile(prevUser, nextUser) {
          if (!nextUser || !nextUser.id) return;
          var fields = {};
          var changed = false;
          ['name','country','avatar_url','bio','phone','birthday','gender'].forEach(function(f){
            if (nextUser[f] !== undefined && (!prevUser || prevUser[f] !== nextUser[f])) {
              fields[f] = nextUser[f]; changed = true;
            }
          });
          if (changed) gasPost({ action: 'updateUserProfile', userId: nextUser.id, fields: fields });
        }

        // Override setItem so any write the React app makes also pushes to GAS
        var _s = Storage.prototype.setItem;
        Storage.prototype.setItem = function(k, v) {
          var prev = null;
          if (k === SESSION_KEY) prev = getCurrentUser();
          _s.call(this, k, v);
          if (window[REMOTE_WRITE_FLAG]) return;
          if (this !== window.localStorage) return;
          if (k === BOOKMARKS_KEY)      debouncedPush('bm',  pushBookmarks);
          else if (k === HISTORY_KEY)   debouncedPush('hi',  pushHistory);
          else if (k === SESSION_KEY) {
            var nu = getCurrentUser();
            // First time we see this user logged in on this device → pull cloud data
            if (nu && nu.id && localStorage.getItem(SYNCED_FLAG) !== nu.id) {
              pullUserData(nu.id);
            }
            // Profile fields edited locally → push to cloud
            if (nu && prev && nu.id === prev.id) pushProfile(prev, nu);
          }
        };

        // Initial pull on page load if user is already logged in
        function initialSync() {
          var u = getCurrentUser();
          if (u && u.id) pullUserData(u.id);
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', initialSync);
        } else {
          initialSync();
        }

        // Also re-pull when another tab logs in/out
        window.addEventListener('storage', function(ev){
          if (ev.key === SESSION_KEY) {
            var u = getCurrentUser();
            if (u && u.id && localStorage.getItem(SYNCED_FLAG) !== u.id) pullUserData(u.id);
          }
        });
      } catch(e) {}
    })();
    </script>
